<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Screening Results</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:30px;
        }

        h1{
            text-align:center;
            color:#007bff;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            margin-top:20px;
        }

        th, td{
            border:1px solid #ddd;
            padding:12px;
            text-align:center;
        }

        th{
            background:#007bff;
            color:white;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            background:#007bff;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        .center{
            text-align:center;
        }
    </style>
</head>
<body>

<h1>Resume Screening Results</h1>

<table>
    <tr>
        <th>Resume</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Skills</th>
        <th>Match Score</th>
    </tr>

    {% for candidate in results %}
    <tr>
        <td>{{ candidate.name }}</td>
        <td>{{ candidate.email }}</td>
        <td>{{ candidate.phone }}</td>
        <td>{{ candidate.skills }}</td>
        <td>{{ candidate.score }}%</td>
    </tr>
    {% endfor %}

</table>

<div class="center">
    <a href="{{ url_for('dashboard') }}" class="btn">Back to Dashboard</a>
</div>

</body>
</html>
